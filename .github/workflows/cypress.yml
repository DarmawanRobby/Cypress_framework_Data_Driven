name: Cypress Tests

on:
  push:
    branches: [main]
  pull_request:

jobs:
  cypress-run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      # Fast smoke on PRs, full suite on pushes to main.
      - name: Run Cypress
        uses: cypress-io/github-action@v6
        with:
          install: false
          command: ${{ github.event_name == 'pull_request' && 'npm run test:smoke' || 'npm run test:dev' }}

      - name: Upload HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cypress-report
          path: cypress/reports
          if-no-files-found: ignore
